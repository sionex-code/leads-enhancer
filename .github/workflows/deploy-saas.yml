name: Deploy LeadsFunda SaaS → app.leadsfunda.com

# Deploys the LeadsFunda SaaS app (NOT the legacy /leads dashboard — that has its
# own deploy.yml). Pushing this branch ships the working tree to the EXISTING prod
# install and rebuilds it in place.
#
# Two-host topology (one Next.js process on :3001 behind two nginx vhosts):
#   • Marketing landing  -> leadsfunda.com (+ www)
#   • Authenticated app  -> app.leadsfunda.com   (= NEXTAUTH_URL; all auth lives here)
# The split is enforced by middleware.js using NEXT_PUBLIC_APP_URL /
# NEXT_PUBLIC_MARKETING_URL, which MUST be present in the VPS `.env.local` BEFORE
# this build runs (NEXT_PUBLIC_* are inlined at build time).
#
# Hard-won invariants (see vps-deploy memory). Changing any of these breaks prod:
#   • App dir is /home/adminsafe/leadsfunda — it already holds the prod `.env.local`
#     (DATABASE_URL → local PG, WAREHOUSE_DATABASE_URL, Whop, Google auth, OWA
#     WhatsApp, NEXTAUTH_URL=https://app.leadsfunda.com, NEXT_PUBLIC_APP_URL,
#     NEXT_PUBLIC_MARKETING_URL). We NEVER ship `.env.local` (the tar excludes it; a
#     clean CI checkout wouldn't have it anyway) and NEVER inject those secrets here —
#     the VPS owns them.
#   • pm2 app is `leadsfunda-ui` on PORT 3001. We restart the existing process; we do
#     NOT create a second one (a 2nd process on 3001 → EADDRINUSE crash-loop).
#   • Build happens ON the VPS. Next 16 / Turbopack externalizes `pg` as a content-
#     hashed virtual module, so a locally-built `.next` is NOT runnable here — the tar
#     excludes `.next` and we run `npm run build` remotely.
#   • Root build (no basePath); both hosts serve at /.

on:
  push:
    branches: [saas-leadsfunda]
  workflow_dispatch:

concurrency:
  group: deploy-leadsfunda-saas
  cancel-in-progress: false

env:
  VPS_HOST: 144.91.104.65
  VPS_USER: adminsafe
  APP_DIR: /home/adminsafe/leadsfunda
  PM2_APP: leadsfunda-ui
  APP_PORT: "3001"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      # Ship the source tree only. Exclude build output + secrets + heavy artifacts.
      # The VPS keeps its own .env.local / output / node_modules.
      - name: Upload release tarball
        run: |
          tar czf /tmp/saas-deploy.tgz \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=.env.local \
            --exclude=dist-electron \
            --exclude=output \
            --exclude=.chrome-profile \
            .
          scp -i ~/.ssh/id_ed25519 /tmp/saas-deploy.tgz "$VPS_USER@$VPS_HOST:/tmp/saas-deploy.tgz"

      # Extract over the app dir (.env.local / output / leads stay put), install,
      # rebuild ON the VPS at root, then restart the existing pm2 process on 3001.
      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" "
            set -e
            cd '$APP_DIR'

            # Rolling backup (keep last 5), excluding the heavy/regenerable dirs.
            tar czf ~/leadsfunda-backup-\$(date +%Y%m%d-%H%M%S).tgz \
              --exclude=node_modules --exclude=.next --exclude=output \
              --exclude=.chrome-profile . 2>/dev/null || true
            ls -t ~/leadsfunda-backup-*.tgz 2>/dev/null | tail -n +6 | xargs -r rm --

            tar xzf /tmp/saas-deploy.tgz
            rm -f /tmp/saas-deploy.tgz

            npm install --no-audit --no-fund

            # Root build (no basePath). Bump heap — the VPS needs ~4G for next build.
            NEXT_PUBLIC_BASE_PATH= NODE_OPTIONS=--max-old-space-size=4096 npm run build

            # Restart the EXISTING process on its port. start:web honours \$PORT now
            # (no hardcoded -p), so PORT pins it to 3001. Never start a 2nd process.
            if pm2 describe '$PM2_APP' > /dev/null 2>&1; then
              PORT='$APP_PORT' pm2 restart '$PM2_APP' --update-env
            else
              PORT='$APP_PORT' pm2 start 'npm run start:web' --name '$PM2_APP'
              pm2 save
            fi
          "

      # Validate the process is up AND the two-host split is wired correctly.
      # Uses Host headers against the local port (origin) so it does not depend on
      # DNS/Cloudflare. Marketing host serves the landing (200); app host has no
      # landing so "/" and the gated pages redirect (3xx) to sign-in.
      - name: Health check
        run: |
          sleep 8
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" '
            P='"$APP_PORT"'
            code() { curl -s -o /dev/null -w "%{http_code}" -H "Host: $1" "http://localhost:$P$2"; }
            mroot=$(code leadsfunda.com /);
            aroot=$(code app.leadsfunda.com /);
            adash=$(code app.leadsfunda.com /dashboard);
            mdash=$(code leadsfunda.com /dashboard);
            api=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:$P/api/me");
            echo "marketing/=$mroot  app/=$aroot  app/dashboard=$adash  marketing/dashboard=$mdash  api/me=$api";
            [ "$mroot" = "200" ] || { echo "FAIL: marketing landing not 200"; exit 1; };
            { [ "$api" = "401" ] || [ "$api" = "200" ]; } || { echo "FAIL: api/me bad"; exit 1; };
            case "$aroot" in 3??) ;; *) echo "FAIL: app / should redirect"; exit 1;; esac;
            case "$adash" in 3??) ;; *) echo "FAIL: app /dashboard should redirect"; exit 1;; esac;
            case "$mdash" in 3??) ;; *) echo "FAIL: marketing /dashboard should redirect to app"; exit 1;; esac;
            echo "OK: app up + two-host split verified"
          '
