<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded square background in brand blue -->
  <rect width="64" height="64" rx="12" ry="12" fill="#3147ff"/>
  <!-- LeadsFunda "L" glyph mark (white), derived from the left polygon of the logo.
       Original viewBox 0 0 132.24 132.24 for just the mark portion, scaled to ~48x48 centered. -->
  <g transform="translate(8, 8) scale(0.363636)">
    <!-- Dark right half (rendered white for contrast on blue bg) -->
    <polygon fill="white" fill-opacity="0.85"
      points="132.24 66.12 66.12 132.24 56.19 122.31 54.17 131.5 54.16 131.5 54.16 81.01 80.38 81.01 80.38 74.19 54.16 74.19 54.16 53.82 85.75 53.82 85.75 47 54.16 47 54.16 .93 56.15 9.97 66.12 0 132.24 66.12"/>
    <!-- Blue left strip (rendered slightly lighter white) -->
    <polygon fill="white"
      points="47.35 .93 47.35 131.5 42.27 108.39 0 66.12 42.33 23.79 47.35 .93"/>
  </g>
</svg>
